<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Progress</title>
  <style>
    body {
      margin: 0;
      background: #f3f3f3;
      color: #111;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .widget {
      width: 420px;
      padding: 28px 24px;
      box-sizing: border-box;
    }

    .clock {
      text-align: center;
      font-size: 56px;
      margin-bottom: 28px;
      letter-spacing: 2px;
    }

    .row {
      display: grid;
      grid-template-columns: 60px 1fr 70px;
      gap: 14px;
      align-items: center;
      margin: 14px 0;
      font-size: 16px;
    }

    .bar {
      height: 12px;
      background: #dfdfdf;
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0;
      background: #333;
      border-radius: 999px;
    }

    .value {
      text-align: right;
      font-size: 14px;
    }

    .footer {
      margin-top: 22px;
      text-align: center;
      font-size: 12px;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="clock" id="clock">00:00:00</div>

    <div class="row">
      <div>Year</div>
      <div class="bar"><div class="fill" id="yearFill"></div></div>
      <div class="value" id="yearValue">0/365</div>
    </div>

    <div class="row">
      <div>Month</div>
      <div class="bar"><div class="fill" id="monthFill"></div></div>
      <div class="value" id="monthValue">0/30</div>
    </div>

    <div class="row">
      <div>Week</div>
      <div class="bar"><div class="fill" id="weekFill"></div></div>
      <div class="value" id="weekValue">0/7</div>
    </div>

    <div class="footer">Powered by Your Widget</div>
  </div>

  <script>
    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function getDayOfYear(date) {
      const start = new Date(date.getFullYear(), 0, 0);
      const diff = date - start;
      return Math.floor(diff / 86400000);
    }

    function getDaysInYear(year) {
      return ((year % 4 === 0 && year % 100 !== 0) || year % 400 === 0) ? 366 : 365;
    }

    function getDaysInMonth(year, month) {
      return new Date(year, month + 1, 0).getDate();
    }

    function update() {
      const now = new Date();

      document.getElementById('clock').textContent =
        pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());

      const dayOfYear = getDayOfYear(now);
      const totalYear = getDaysInYear(now.getFullYear());
      document.getElementById('yearValue').textContent = dayOfYear + '/' + totalYear;
      document.getElementById('yearFill').style.width = (dayOfYear / totalYear * 100) + '%';

      const dayOfMonth = now.getDate();
      const totalMonth = getDaysInMonth(now.getFullYear(), now.getMonth());
      document.getElementById('monthValue').textContent = dayOfMonth + '/' + totalMonth;
      document.getElementById('monthFill').style.width = (dayOfMonth / totalMonth * 100) + '%';

      let dayOfWeek = now.getDay();
      dayOfWeek = dayOfWeek === 0 ? 7 : dayOfWeek; // Monday-first
      document.getElementById('weekValue').textContent = dayOfWeek + '/7';
      document.getElementById('weekFill').style.width = (dayOfWeek / 7 * 100) + '%';
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
