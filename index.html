<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Progress Widget</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="widget" id="widget">
    <div class="clock" id="clock">00:00:00</div>

    <div class="row" id="yearRow">
      <div class="label" id="yearLabel">Year</div>
      <div class="bar"><div class="fill" id="yearFill"></div></div>
      <div class="value" id="yearValue">0/365</div>
    </div>

    <div class="row" id="monthRow">
      <div class="label" id="monthLabel">Month</div>
      <div class="bar"><div class="fill" id="monthFill"></div></div>
      <div class="value" id="monthValue">0/30</div>
    </div>

    <div class="row" id="weekRow">
      <div class="label" id="weekLabel">Week</div>
      <div class="bar"><div class="fill" id="weekFill"></div></div>
      <div class="value" id="weekValue">0/7</div>
    </div>

    <div class="footer" id="footer">Powered by Your Widget</div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
